# Conda environment for running aircraft_movies_animations and its
# graphics-dependent tests (test_subplot_animation.py). Provides the full
# Python stack: matplotlib, cartopy, xarray + netcdf4, pandas, numpy. (The
# stdlib-only suites test_layout / test_paths / test_config_loader need none of
# this.) FFmpeg/ffprobe are installed separately (e.g. `brew install ffmpeg`).
#
# Create and activate:
#   conda env create -f environment.yml
#   conda activate animation
#   python -m unittest test_subplot_animation -v
#
# Update after editing this file:
#   conda env update -f environment.yml --prune
#
# Remove:
#   conda env remove -n animation
#
# Python 3.13 (not 3.14): cartopy has no 3.14 build yet. conda-forge
# provides cartopy with its native GEOS/PROJ/shapely deps.
name: animation
channels:
  - conda-forge
dependencies:
  - python=3.13
  - matplotlib
  - cartopy
  - xarray
  - netcdf4
  - pandas
  - numpy
